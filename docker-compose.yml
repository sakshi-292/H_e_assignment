services:
  postgres:
    image: postgres:16
    container_name: interveneai-postgres
    restart: unless-stopped
    ports:
      # Host port 5433 to avoid clashing with a local Postgres on 5432.
      - "5433:5432"
    environment:
      POSTGRES_USER: interveneai
      POSTGRES_PASSWORD: interveneai
      POSTGRES_DB: interveneai
    volumes:
      - interveneai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interveneai -d interveneai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  interveneai_pgdata:
